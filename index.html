<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="Platform turnamen eFootball terdepan di Way Kanan. Cek klasemen, jadwal, dan statistik real-time.">
    <title>eFootball WAKACL Tournament</title>
    <link rel="manifest" href="/manifest.json" id="manifest-link">
    <link rel="apple-touch-icon" href="/vite.svg">
    <script>
      // Polyfill for global which is required by some Firebase auth dependencies
      if (typeof global === 'undefined') {
        window.global = window;
      }
      // Polyfill for process which is required by @google/genai SDK usage pattern
      if (typeof process === 'undefined') {
        window.process = { env: {} };
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="light"]'],
        theme: {
          extend: {
            colors: {
              'brand-primary': 'var(--brand-primary)', 
              'brand-secondary': 'var(--brand-secondary)', 
              'brand-accent': 'var(--brand-accent)', 
              'brand-light': 'var(--brand-light)',   
              'brand-text': 'var(--brand-text)',   
              'brand-vibrant': 'var(--brand-vibrant)', 
              'brand-special': 'var(--brand-special)', 
              'brand-gradient-start': '#1d4ed8', 
              'brand-gradient-end': '#fbbf24', 
            },
            fontFamily: {
                sans: ['Inter', 'Outfit', 'sans-serif'],
            },
            borderRadius: {
              'deepin': '24px',
              'deepin-lg': '32px',
            },
            animation: {
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-20px)' },
                }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Deepin OS Dark Theme - Elegant Glass */
        --brand-primary: #121212; 
        --brand-secondary: rgba(30, 30, 30, 0.7);
        --brand-accent: rgba(45, 45, 45, 0.5);
        --brand-light: #94a3b8;
        --brand-text: #ffffff;
        --brand-vibrant: #0078d4; /* Deepin Blue */
        --brand-special: #ffcc00;
        --brand-shadow-color: rgba(0, 0, 0, 0.3);
        --glass-bg: rgba(25, 25, 25, 0.6);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      [data-theme="light"] {
        /* Deepin OS Light Theme - Frosted Glass */
        --brand-primary: #f5f5f7;
        --brand-secondary: rgba(255, 255, 255, 0.7);
        --brand-accent: rgba(240, 240, 245, 0.5);
        --brand-light: #64748b;
        --brand-text: #1d1d1f;
        --brand-vibrant: #0078d4;
        --brand-special: #d97706;
        --brand-shadow-color: rgba(0, 0, 0, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.6);
        --glass-border: rgba(0, 0, 0, 0.05);
      }

      /* Deepin Glassmorphism */
      .deepin-glass {
        background: var(--glass-bg);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 var(--brand-shadow-color);
      }

      .deepin-card {
        border-radius: 24px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .deepin-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px 0 var(--brand-shadow-color);
      }

      /* Background Atmosphere */
      body {
        background: radial-gradient(circle at top right, rgba(0, 120, 212, 0.15), transparent 40%),
                    radial-gradient(circle at bottom left, rgba(234, 179, 8, 0.1), transparent 40%),
                    var(--brand-primary);
        background-attachment: fixed;
        min-height: 100vh;
      }

      /* Mobile optimization fixes */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }

      /* Custom scrollbar for better look */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
      
      /* Better touch highlights */
      * { -webkit-tap-highlight-color: transparent; }
      
      /* Ensure inputs don't zoom on iOS */
      input, select, textarea { font-size: 16px !important; }
      @media (min-width: 640px) {
        input, select, textarea { font-size: inherit !important; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "html2canvas": "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.esm.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-brand-primary text-brand-text font-sans antialiased selection:bg-brand-vibrant selection:text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
