<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="Platform turnamen eFootball terdepan di Way Kanan. Cek klasemen, jadwal, dan statistik real-time.">
    <title>eFootball WAKACL Tournament</title>
    <link rel="manifest" href="/manifest.json" id="manifest-link">
    <link rel="apple-touch-icon" href="/vite.svg">
    <script>
      // Polyfill for global which is required by some Firebase auth dependencies
      if (typeof global === 'undefined') {
        window.global = window;
      }
      // Polyfill for process which is required by @google/genai SDK usage pattern
      if (typeof process === 'undefined') {
        window.process = { env: {} };
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="light"]'],
        theme: {
          extend: {
            colors: {
              'brand-primary': 'var(--brand-primary)', 
              'brand-secondary': 'var(--brand-secondary)', 
              'brand-accent': 'var(--brand-accent)', 
              'brand-light': 'var(--brand-light)',   
              'brand-text': 'var(--brand-text)',   
              'brand-vibrant': 'var(--brand-vibrant)', 
              'brand-special': 'var(--brand-special)', 
              'brand-gradient-start': '#1d4ed8', 
              'brand-gradient-end': '#fbbf24', 
            },
            fontFamily: {
                sans: ['Inter', 'Outfit', 'sans-serif'],
            },
            borderRadius: {
              'deepin': '24px',
              'deepin-lg': '32px',
            },
            animation: {
                'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-20px)' },
                }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Esports AMOLED Minimal Dark Theme */
        --brand-primary: #050505; 
        --brand-secondary: rgba(20, 20, 20, 0.9);
        --brand-accent: rgba(45, 45, 45, 0.6);
        --brand-light: #a3a3a3;
        --brand-text: #ffffff;
        --brand-vibrant: #10b981; /* Emerald Green for esports vibe */
        --brand-special: #f59e0b; /* Amber */
        --brand-shadow-color: rgba(0, 0, 0, 0.6);
        --glass-bg: rgba(10, 10, 10, 0.65);
        --glass-border: rgba(255, 255, 255, 0.06);
      }

      [data-theme="light"] {
        /* Minimal Light Theme */
        --brand-primary: #fcfcfc;
        --brand-secondary: rgba(255, 255, 255, 0.9);
        --brand-accent: rgba(230, 230, 230, 0.8);
        --brand-light: #52525b;
        --brand-text: #09090b;
        --brand-vibrant: #059669; /* Darker Emerald for light mode */
        --brand-special: #d97706;
        --brand-shadow-color: rgba(0, 0, 0, 0.08);
        --glass-bg: rgba(255, 255, 255, 0.85);
        --glass-border: rgba(0, 0, 0, 0.04);
      }

      /* Clean Glassmorphism */
      .deepin-glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 30px 0 var(--brand-shadow-color);
      }

      .deepin-card {
        border-radius: 20px;
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .deepin-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 40px 0 var(--brand-shadow-color);
        border-color: rgba(16, 185, 129, 0.2);
      }

      /* Background Atmosphere */
      body {
        background: var(--brand-primary);
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.03), transparent 25%),
          radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.02), transparent 25%);
        background-attachment: fixed;
        min-height: 100vh;
      }

      /* RTF Content Styling */
      .rtf-content h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; margin-top: 1.5rem; color: var(--brand-vibrant); }
      .rtf-content h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; margin-top: 1.25rem; color: var(--brand-text); }
      .rtf-content h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; margin-top: 1rem; color: var(--brand-text); }
      .rtf-content p { margin-bottom: 1rem; }
      .rtf-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
      .rtf-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
      .rtf-content li { margin-bottom: 0.25rem; }
      .rtf-content b, .rtf-content strong { font-weight: 700; color: var(--brand-text); }
      .rtf-content u { text-decoration: underline; }
      .rtf-content i, .rtf-content em { font-style: italic; }
      .rtf-content blockquote { border-left: 4px solid var(--brand-accent); padding-left: 1rem; font-style: italic; color: var(--brand-light); }

      /* Mobile optimization fixes */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }

      /* Custom scrollbar for better look */
      input, select, textarea { font-size: 16px !important; }
      @media (min-width: 640px) {
        input, select, textarea { font-size: inherit !important; }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "html2canvas": "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.esm.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-brand-primary text-brand-text font-sans antialiased selection:bg-brand-vibrant selection:text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
